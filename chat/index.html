<!DOCTYPE html>
<html>
<head>
    <title>Room 29 Chat</title>

    <style>
        :root {
            --bg: #202225;
            --bg-alt: #2f3136;
            --text: #ffffff;
            --text-muted: #b9bbbe;
            --accent: #5865f2;
            --input-bg: #40444b;
            --border: #18191c;
        }

        .light {
            --bg: #f3f4f6;
            --bg-alt: #ffffff;
            --text: #111827;
            --text-muted: #6b7280;
            --accent: #3b82f6;
            --input-bg: #e5e7eb;
            --border: #d1d5db;
        }

        body {
            margin: 0;
            font-family: system-ui;
            background: var(--bg);
            color: var(--text);
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 240px;
            background: #18191c;
            padding: 12px;
            box-sizing: border-box;
            color: #dcddde;
        }

        .home-btn {
            cursor: pointer;
            font-size: 16px;
            margin-bottom: 16px;
        }

        .sidebar h2 {
            font-size: 16px;
            margin: 0 0 10px;
        }

        .channel {
            padding: 6px 8px;
            border-radius: 4px;
            font-size: 14px;
            color: #b9bbbe;
        }

        .channel.active {
            background: #3f4248;
            color: #ffffff;
        }

        .login-btn {
            margin-top: 12px;
            padding: 6px 10px;
            font-size: 13px;
            border-radius: 4px;
            border: none;
            background: #4285f4;
            color: white;
            cursor: pointer;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-alt);
            border-left: 1px solid var(--border);
        }

        .topbar {
            height: 48px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
        }

        .topbar-title {
            font-weight: 600;
        }

        .user-info {
            font-size: 13px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .user-avatar-small {
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }

        .mode-toggle {
            font-size: 13px;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid var(--border);
        }

        .messages {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
        }

        .message {
            margin-bottom: 10px;
            font-size: 14px;
            display: flex;
            gap: 8px;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .message-content {
            display: flex;
            flex-direction: column;
        }

        .message-header {
            display: flex;
            align-items: baseline;
            gap: 6px;
        }

        .message-name {
            font-weight: 600;
        }

        .message-time {
            font-size: 11px;
            color: var(--text-muted);
        }

        .message-text {
            color: var(--text);
        }

        .input-area {
            border-top: 1px solid var(--border);
            padding: 10px 16px;
        }

        .input-row {
            display: flex;
            gap: 8px;
        }

        textarea {
            flex: 1;
            resize: none;
            height: 50px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px;
            border-radius: 4px;
            font-size: 14px;
        }

        textarea::placeholder {
            color: var(--text-muted);
        }

        button.send-btn {
            background: var(--accent);
            border: none;
            color: white;
            padding: 8px 14px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }

        /* SCHOOL MODE */
        .schoolmode .message-time {
            display: none !important;
        }

        .schoolmode .messages {
            opacity: 0.15;
            pointer-events: none;
        }

        .schoolmode .topbar-title::after {
            content: " | School Code Required";
            font-size: 12px;
            color: var(--text-muted);
        }
    </style>
</head>

<body class="dark">

    <!-- SCHOOL SCREEN -->
    <div id="schoolScreen" style="display:none; padding:20px; font-family:system-ui;">
        <h2>School Access Portal</h2>

        <p style="font-size:14px; color:gray;">
            Codes: <b>111t</b> for Toddle • <b>222l</b> for Ludi • <b>333w</b> for Writer’s Toolbox
        </p>

        <p>Enter your school code to continue:</p>

        <input id="schoolCodeInput" placeholder="Enter code..." style="padding:8px; font-size:16px; width:200px;">
        <button onclick="processSchoolCode()" style="padding:8px 12px; font-size:16px; margin-left:10px;">Go</button>

        <p id="schoolError" style="color:red; margin-top:10px; display:none;">Incorrect code</p>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="home-btn" onclick="window.location.href='https://realyosuns.github.io/room.29.ludi.practise/'">🏠 Home</div>
        <h2>Room 29</h2>
        <div class="channel active"># general</div>

        <button class="login-btn" onclick="toggleSchoolMode()">School Mode</button>

        <button id="fallbackLogin" class="login-btn" onclick="googleLogin()" style="display:none;">
            Login with Google
        </button>
    </div>

    <!-- MAIN CHAT -->
    <div class="main">
        <div class="topbar">
            <div class="topbar-title"># general</div>
            <div class="user-info">
                <img id="userAvatarSmall" class="user-avatar-small" style="display:none;">
                <span id="userNameLabel">Logging in...</span>
            </div>
            <div class="mode-toggle" onclick="toggleMode()">Toggle light/dark</div>
        </div>

        <div id="messages" class="messages"></div>

        <div class="input-area">
            <div class="input-row">
                <textarea id="msg" placeholder="Type a message... (Enter to send)"></textarea>
                <button class="send-btn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <!-- SCRIPT -->
    <script type="module">

        /* IMPORTS */
        import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, set } 
        from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged }
        from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";

        /* FIREBASE CONFIG */
        const firebaseConfig = {
            apiKey: "AIzaSyBCLNLLSe-ex6lo60P3wDQ-_n510dnM-nc",
            authDomain: "room29practise.firebaseapp.com",
            databaseURL: "https://room29practise-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "room29practise",
            storageBucket: "room29practise.firebasestorage.app",
            messagingSenderId: "109147297724",
            appId: "1:109147297724:web:ac7ba4419a7c0a1f33fdb9"
        };

        const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const messagesRef = ref(db, "messages");

        const auth = getAuth();
        const provider = new GoogleAuthProvider();

        const userNameLabel = document.getElementById("userNameLabel");
        const userAvatarSmall = document.getElementById("userAvatarSmall");
        const msgInput = document.getElementById("msg");
        const messagesDiv = document.getElementById("messages");

        /* GLOBAL LOCKDOWN COMMANDS */
        msgInput.addEventListener("input", function () {
            const text = msgInput.value.trim();

            if (text === "111t") {
                set(ref(db, "messages"), null);
                window.location.href = "https://toddleapp.com";
            }

            if (text === "222l") {
                set(ref(db, "messages"), null);
                window.location.href = "https://ludi.nz";
            }

            if (text === "333w") {
                set(ref(db, "messages"), null);
                window.location.href = "https://www.writerstoolbox.com/";
            }
        });

        /* GOOGLE LOGIN */
        window.googleLogin = function () {
            signInWithPopup(auth, provider)
                .then((result) => {
                    const user = result.user;
                    userNameLabel.textContent = user.displayName;
                    userAvatarSmall.src = user.photoURL;
                    userAvatarSmall.style.display = "inline-block";
                })
                .catch((error) => {
                    console.log("Popup blocked:", error.code);
                    document.getElementById("fallbackLogin").style.display = "block";
                    userNameLabel.textContent = "Login required";
                });
        };

        /* AUTO LOGIN */
        onAuthStateChanged(auth, (user) => {
            if (user) {
                userNameLabel.textContent = user.displayName;
                userAvatarSmall.src = user.photoURL;
                userAvatarSmall.style.display = "inline-block";
            } else {
                googleLogin();
            }
        });

        /* SEND MESSAGE */
        window.sendMessage = function () {
            const text = msgInput.value.trim();
            if (!text) return;

            const user = auth.currentUser;
            if (!user) {
                alert("You must log in with Google first!");
                return;
            }

            push(messagesRef, {
                uid: user.uid,
                name: user.displayName,
                avatar: user.photoURL,
                text: text,
                time: Date.now()
            });

            msgInput.value = "";
        };

        msgInput.addEventListener("keydown", function (e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        /* DISPLAY MESSAGES */
        onChildAdded(messagesRef, (snapshot) => {
            const data = snapshot.val();
            const time = new Date(data.time).toLocaleTimeString([], {
                hour: "2-digit",
                minute: "2-digit"
            });

            const div = document.createElement("div");
            div.className = "message";

            const avatarImg = document.createElement("img");
            avatarImg.className = "avatar";
            avatarImg.src = data.avatar || "";
            if (!data.avatar) avatarImg.style.display = "none";

            const contentDiv = document.createElement("div");
            contentDiv.className = "message-content";

            const headerDiv = document.createElement("div");
            headerDiv.className = "message-header";

            const nameSpan = document.createElement("span");
            nameSpan.className = "message-name";
            nameSpan.textContent = data.name;

            const timeSpan = document.createElement("span");
            timeSpan.className = "message-time";
            timeSpan.textContent = time;

            const textDiv = document.createElement("div");
            textDiv.className = "message-text";
            textDiv.textContent = data.text;

            headerDiv.appendChild(nameSpan);
            headerDiv.appendChild(timeSpan);
            contentDiv.appendChild(headerDiv);
            contentDiv.appendChild(textDiv);

            div.appendChild(avatarImg);
            div.appendChild(contentDiv);

            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        });

        /* LIGHT/DARK MODE */
        window.toggleMode = function () {
            const body = document.body;
            body.classList.toggle("light");
            body.classList.toggle("dark");
        };

        /* SCHOOL MODE */
        window.toggleSchoolMode = function () {
            document.body.classList.add("schoolmode");
            document.querySelector(".main").style.display = "none";
            document.querySelector(".sidebar").style.display = "none";
            document.getElementById("schoolScreen").style.display = "block";
        };

        window.processSchoolCode = function () {
            const code = document.getElementById("schoolCodeInput").value.trim();
            const error = document.getElementById("schoolError");

            if (code === "111t") {
                window.location.href = "https://toddleapp.com";
            } else if (code === "222l") {
                window.location.href = "https://ludi.nz";
            } else if (code === "333w") {
                window.location.href = "https://www.writerstoolbox.com/";
            } else {
                error.style.display = "block";
                setTimeout(() => error.style.display = "none", 2000);
            }
        };

    </script>
</body>
</html>
