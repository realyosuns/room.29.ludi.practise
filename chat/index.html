<!DOCTYPE html>
<html>
<head>
    <title>Room 29 Chat</title>

    <!-- Modern Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBCLNLLSe-ex6lo60P3wDQ-_n510dnM-nc",
            authDomain: "room29practise.firebaseapp.com",
            databaseURL: "https://room29practise-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "room29practise",
            storageBucket: "room29practise.firebasestorage.app",
            messagingSenderId: "109147297724",
            appId: "1:109147297724:web:ac7ba4419a7c0a1f33fdb9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const messagesRef = ref(db, "messages");

        window.sendMessage = function () {
            const name = document.getElementById("name").value.trim();
            const msg = document.getElementById("msg").value.trim();
            if (!name || !msg) return;

            push(messagesRef, {
                name: name,
                text: msg,
                time: Date.now()
            });

            document.getElementById("msg").value = "";
        };

        onChildAdded(messagesRef, (snapshot) => {
            const data = snapshot.val();
            const messages = document.getElementById("messages");

            const time = new Date(data.time).toLocaleTimeString([], {
                hour: "2-digit",
                minute: "2-digit"
            });

            const div = document.createElement("div");
            div.className = "message";
            div.innerHTML = `
                <span class="message-name">${data.name}</span>
                <span class="message-text">${data.text}</span>
                <span class="message-time">${time}</span>
            `;

            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        });
    </script>

    <style>
        :root {
            --bg: #202225;
            --bg-alt: #2f3136;
            --text: #ffffff;
            --text-muted: #b9bbbe;
            --accent: #5865f2;
            --input-bg: #40444b;
            --border: #18191c;
        }

        .light {
            --bg: #f3f4f6;
            --bg-alt: #ffffff;
            --text: #111827;
            --text-muted: #6b7280;
            --accent: #3b82f6;
            --input-bg: #e5e7eb;
            --border: #d1d5db;
        }

        body {
            margin: 0;
            font-family: system-ui;
            background: var(--bg);
            color: var(--text);
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 220px;
            background: #18191c;
            padding: 12px;
        }

        .home-btn {
            cursor: pointer;
            font-size: 16px;
            margin-bottom: 20px;
            color: #fff;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-alt);
        }

        .topbar {
            height: 48px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
        }

        .mode-toggle {
            cursor: pointer;
            padding: 4px 8px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .messages {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
        }

        .message {
            margin-bottom: 10px;
            font-size: 14px;
        }

        .message-name {
            font-weight: 600;
            margin-right: 6px;
        }

        .message-time {
            font-size: 11px;
            color: var(--text-muted);
            margin-left: 6px;
        }

        .input-area {
            border-top: 1px solid var(--border);
            padding: 10px 16px;
        }

        .input-row {
            display: flex;
            gap: 8px;
        }

        input, textarea {
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px;
            border-radius: 4px;
        }

        textarea {
            flex: 1;
            resize: none;
            height: 50px;
        }

        button {
            background: var(--accent);
            border: none;
            color: white;
            padding: 8px 14px;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>

<body class="dark">
    <div class="sidebar">
        <div class="home-btn" onclick="window.location.href='https://realyosuns.github.io/room.29.ludi.practise/'">🏠 Home</div>
        <h2>Room 29</h2>
        <div># general</div>
    </div>

    <div class="main">
        <div class="topbar">
            <div># general</div>
            <div class="mode-toggle" onclick="toggleMode()">Toggle light/dark</div>
        </div>

        <div id="messages" class="messages"></div>

        <div class="input-area">
            <div class="input-row">
                <input id="name" placeholder="Your name">
                <textarea id="msg" placeholder="Type a message... (Enter to send)"></textarea>
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        document.getElementById("msg").addEventListener("keydown", function(e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function toggleMode() {
            const body = document.body;
            body.classList.toggle("light");
            body.classList.toggle("dark");
        }
    </script>
</body>
</html>
