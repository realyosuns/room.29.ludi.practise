<!DOCTYPE html>
<html>
<head>
  <title>Tower Race v0.7 (Beatable)</title>
  <style>
    body {
      margin: 0;
      background: #111;
      color: #fff;
      font-family: system-ui;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #ui {
      text-align: center;
      padding: 10px;
      width: 100%;
      box-sizing: border-box;
    }

    #status {
      margin-left: 10px;
    }

    #gameCanvas {
      background: #222;
      display: block;
      margin: 0 auto;
      border: 1px solid #444;
    }
  </style>
</head>
<body>
  <div id="ui">
    <button id="joinBtn">Join Game</button>
    <button id="resetBtn">Reset Room</button>
    <span id="status">Not connected</span>
  </div>

  <canvas id="gameCanvas" width="600" height="800"></canvas>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
    import { getDatabase, ref, get, onValue, set, update }
      from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider }
      from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBCLNLLSe-ex6lo60P3wDQ-_n510dnM-nc",
      authDomain: "room29practise.firebaseapp.com",
      databaseURL: "https://room29practise-default-rtdb.firebaseio.com",
      projectId: "room29practise",
      storageBucket: "room29practise.firebasestorage.app",
      messagingSenderId: "109147297724",
      appId: "1:109147297724:web:ac7ba4419a7c0a1f33fdb9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();
    let userEmail = null;

    const ROOM_ID = "tower-room-1";
    const roomRef = ref(db, "rooms/" + ROOM_ID);

    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const statusEl = document.getElementById("status");
    const joinBtn = document.getElementById("joinBtn");
    const resetBtn = document.getElementById("resetBtn");

    let playerId = null;
    let players = {};
    let blocks = [];
    let gameStarted = false;

    const TOTAL_BLOCKS = 40;
    const PLAYER_WIDTH = 20;
    const PLAYER_HEIGHT = 20;

    // tuned difficulty
    const MAX_X_GAP = 120;   // tighter sideways
    const MAX_Y_GAP = 55;    // max vertical gap
    const MIN_Y_GAP = 30;    // min vertical gap

    const keys = {};
    window.addEventListener("keydown", e => keys[e.key] = true);
    window.addEventListener("keyup", e => keys[e.key] = false);

    auth.onAuthStateChanged((user) => {
      if (user) {
        userEmail = user.email;
        statusEl.textContent = "Signed in as " + userEmail;
      }
    });

    function randomColor() {
      const colors = ["red","blue","green","yellow","purple","orange","cyan","magenta","lime","pink"];
      return colors[Math.floor(Math.random() * colors.length)];
    }

    async function createTowerIfNeeded() {
      const snap = await get(roomRef);
      const val = snap.val();

      if (val && val.blocks) {
        blocks = val.blocks;
        players = val.players || {};
        gameStarted = !!val.started;
        return;
      }

      blocks = [];
      const width = canvas.width;
      const blockWidth = 120;
      const blockHeight = 25;

      // start block
      blocks.push({
        x: (width - blockWidth) / 2,
        y: canvas.height - 50,
        w: blockWidth,
        h: blockHeight,
        type: "start"
      });

      const baseY = canvas.height - 120;
      let lastX = (width - blockWidth) / 2;
      let lastY = baseY;

      // controlled, beatable tower
      for (let i = 0; i < TOTAL_BLOCKS; i++) {
        let newX = lastX + (Math.random() * MAX_X_GAP * 2 - MAX_X_GAP);
        newX = Math.max(40, Math.min(newX, width - blockWidth - 40)); // keep away from edges

        let newY = lastY - (MIN_Y_GAP + Math.random() * (MAX_Y_GAP - MIN_Y_GAP));

        blocks.push({
          x: newX,
          y: newY,
          w: blockWidth,
          h: blockHeight,
          type: "normal"
        });

        lastX = newX;
        lastY = newY;
      }

      // finish block
      const finishY = lastY - 70;
      blocks.push({
        x: (width - blockWidth) / 2,
        y: finishY,
        w: blockWidth,
        h: blockHeight,
        type: "finish"
      });

      await set(roomRef, {
        blocks,
        players: {},
        started: true
      });

      gameStarted = true;
    }

    joinBtn.onclick = async () => {
      if (!auth.currentUser) {
        statusEl.textContent = "Signing in...";
        const result = await signInWithPopup(auth, provider);
        userEmail = result.user.email;
      } else {
        userEmail = auth.currentUser.email;
      }

      statusEl.textContent = "Signed in as " + userEmail;

      await createTowerIfNeeded();

      const snap = await get(roomRef);
      const val = snap.val() || {};
      const currentPlayers = val.players || {};
      const playerCount = Object.keys(currentPlayers).length;

      if (playerCount >= 10) {
        statusEl.textContent = "Room full (10 players max)";
        return;
      }

      playerId = "p_" + Date.now();

      const startBlock = blocks.find(b => b.type === "start");
      const startX = startBlock.x + startBlock.w / 2 - PLAYER_WIDTH / 2;
      const startY = startBlock.y - PLAYER_HEIGHT;

      const newPlayer = {
        x: startX,
        y: startY,
        vx: 0,
        vy: 0,
        color: randomColor(),
        alive: true,
        respawnTimer: 0,
        email: userEmail
      };

      await update(roomRef, {
        ["players/" + playerId]: newPlayer
      });

      statusEl.textContent = "Joined as " + playerId;
    };

    resetBtn.onclick = async () => {
      if (userEmail !== "lukesun222@gmail.com") {
        statusEl.textContent = "You do not have permission to reset the room.";
        return;
      }

      statusEl.textContent = "Resetting room...";
      await set(roomRef, null);
      await createTowerIfNeeded();
      statusEl.textContent = "Room reset!";
    };

    onValue(roomRef, (snapshot) => {
      const val = snapshot.val();
      if (!val) return;

      players = val.players || {};
      blocks = val.blocks || [];
      gameStarted = !!val.started;
    });

    function isOnBlock(p) {
      return blocks.some(b =>
        p.x + PLAYER_WIDTH > b.x &&
        p.x < b.x + b.w &&
        Math.abs((p.y + PLAYER_HEIGHT) - b.y) < 6
      );
    }

    function updateLocalPlayer() {
      if (!playerId || !players[playerId]) return;

      const p = players[playerId];

      const speed = 3;
      const jumpPower = -12; // slightly higher jump
      const gravity = 0.5;

      if (!p.alive) {
        p.vx = 0;
        p.vy = 0;

        if (p.respawnTimer > 0) {
          p.respawnTimer--;
          statusEl.textContent = "Respawning in " + Math.ceil(p.respawnTimer / 60);
        } else {
          const startBlock = blocks.find(b => b.type === "start");
          p.x = startBlock.x + startBlock.w / 2 - PLAYER_WIDTH / 2;
          p.y = startBlock.y - PLAYER_HEIGHT;
          p.vx = 0;
          p.vy = 0;
          p.alive = true;
          statusEl.textContent = "Respawned!";
        }

        update(roomRef, { ["players/" + playerId]: p });
        return;
      }

      if (keys["ArrowLeft"] || keys["a"]) p.vx = -speed;
      else if (keys["ArrowRight"] || keys["d"]) p.vx = speed;
      else p.vx = 0;

      if ((keys["ArrowUp"] || keys["w"] || keys[" "]) && isOnBlock(p)) {
        p.vy = jumpPower;
      }

      p.vy += gravity;

      p.x += p.vx;
      p.y += p.vy;

      if (p.x < 0) p.x = 0;
      if (p.x > canvas.width - PLAYER_WIDTH) p.x = canvas.width - PLAYER_WIDTH;

      if (p.y > canvas.height) {
        p.alive = false;
        p.respawnTimer = 180;
      }

      blocks.forEach(b => {
        const feetY = p.y + PLAYER_HEIGHT;
        if (
          p.x + PLAYER_WIDTH > b.x &&
          p.x < b.x + b.w &&
          feetY > b.y &&
          feetY < b.y + b.h
        ) {
          p.y = b.y - PLAYER_HEIGHT;
          p.vy = 0;
        }
      });

      const finishBlock = blocks.find(b => b.type === "finish");
      if (finishBlock && p.y <= finishBlock.y - PLAYER_HEIGHT) {
        statusEl.textContent = "🏆 YOU WIN!";
      }

      await update(roomRef, {
        ["players/" + playerId]: p
      });
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#222";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      blocks.forEach(b => {
        if (b.type === "start") ctx.fillStyle = "green";
        else if (b.type === "finish") ctx.fillStyle = "gold";
        else ctx.fillStyle = "#555";

        ctx.fillRect(b.x, b.y, b.w, b.h);
      });

      Object.keys(players).forEach(id => {
        const p = players[id];
        if (!p.alive) ctx.globalAlpha = 0.4;
        ctx.fillStyle = p.color || "white";
        ctx.fillRect(p.x, p.y, PLAYER_WIDTH, PLAYER_HEIGHT);
        ctx.globalAlpha = 1;
      });
    }

    function loop() {
      updateLocalPlayer();
      draw();
      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
